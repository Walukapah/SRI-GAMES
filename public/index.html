<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Online Carrom - Multiplayer Game</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow-x: hidden;
            position: relative;
        }
        
        .game-header {
            text-align: center;
            padding: 15px 10px;
            width: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .game-header h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(243, 156, 18, 0.5);
        }
        
        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected {
            background: #2ecc71;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            max-width: 1400px;
            width: 100%;
            flex: 1;
        }
        
        .game-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }
        
        .carrom-board {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            background: linear-gradient(145deg, #8B4513, #A0522D);
            border-radius: 20px;
            position: relative;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 0 100px rgba(0,0,0,0.3),
                0 0 0 12px #654321,
                0 0 0 16px #3d2817;
            overflow: hidden;
        }
        
        .board-inner {
            position: absolute;
            top: 40px;
            left: 40px;
            right: 40px;
            bottom: 40px;
            background: linear-gradient(145deg, #DEB887, #F5DEB3);
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }
        
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border: 3px solid #8B4513;
            border-radius: 50%;
        }
        
        .center-red-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: #e74c3c;
            border-radius: 50%;
        }
        
        .pocket {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #1a1a1a;
            border-radius: 50%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            z-index: 10;
        }
        
        .pocket.tl { top: 15px; left: 15px; }
        .pocket.tr { top: 15px; right: 15px; }
        .pocket.bl { bottom: 15px; left: 15px; }
        .pocket.br { bottom: 15px; right: 15px; }
        
        canvas {
            position: absolute;
            top: 40px;
            left: 40px;
            width: calc(100% - 80px);
            height: calc(100% - 80px);
            border-radius: 10px;
            cursor: crosshair;
            touch-action: none;
        }
        
        .player-info {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        
        .player-card {
            background: rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 12px;
            text-align: center;
            min-width: 120px;
            flex: 1;
            max-width: 200px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .player-card.active {
            border-color: #f39c12;
            background: rgba(243, 156, 18, 0.2);
            transform: scale(1.02);
        }
        
        .player-card.winner {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.2);
            animation: winnerPulse 1s infinite;
        }
        
        @keyframes winnerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .player-name {
            font-weight: 600;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            margin-bottom: 5px;
            word-break: break-word;
        }
        
        .player-color {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-block;
            margin: 3px;
            border: 2px solid white;
        }
        
        .score {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            font-weight: 800;
            color: #f39c12;
        }
        
        .controls-section {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
        }
        
        .room-controls {
            margin-bottom: 20px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            opacity: 0.9;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .input-group input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .input-group input:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.3);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .game-log {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            margin-top: 15px;
        }
        
        .game-log h3 {
            margin-bottom: 10px;
            color: #f39c12;
            font-size: 1rem;
        }
        
        .log-entry {
            padding: 8px;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            font-size: 0.85rem;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .power-meter {
            margin-top: 15px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
        }
        
        .power-meter label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .power-bar {
            width: 100%;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .power-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #f39c12, #e74c3c);
            width: 0%;
            transition: width 0.1s;
            border-radius: 10px;
        }
        
        .turn-indicator {
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            background: rgba(243, 156, 18, 0.2);
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .waiting-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
            padding: 20px;
        }
        
        .waiting-overlay.hidden {
            display: none;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(243, 156, 18, 0.3);
            border-top-color: #f39c12;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .waiting-overlay h2 {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            margin-bottom: 10px;
            text-align: center;
        }
        
        .waiting-overlay p {
            opacity: 0.8;
            text-align: center;
            font-size: clamp(0.9rem, 3vw, 1rem);
        }
        
        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            background: rgba(231, 76, 60, 0.2);
            border-radius: 10px;
            display: none;
            max-width: 400px;
            width: 100%;
        }
        
        .error-message.show {
            display: block;
        }
        
        .rules-section {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 0.85rem;
        }
        
        .rules-section h4 {
            color: #f39c12;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        
        .rules-section ul {
            list-style: none;
            padding-left: 0;
        }
        
        .rules-section li {
            padding: 4px 0;
            padding-left: 18px;
            position: relative;
        }
        
        .rules-section li:before {
            content: "▸";
            position: absolute;
            left: 0;
            color: #f39c12;
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .main-container {
                padding: 10px;
                gap: 15px;
            }
            
            .carrom-board {
                border-radius: 15px;
                box-shadow: 
                    0 10px 30px rgba(0,0,0,0.5),
                    inset 0 0 50px rgba(0,0,0,0.3),
                    0 0 0 8px #654321,
                    0 0 0 12px #3d2817;
            }
            
            .board-inner {
                top: 25px;
                left: 25px;
                right: 25px;
                bottom: 25px;
            }
            
            canvas {
                top: 25px;
                left: 25px;
                width: calc(100% - 50px);
                height: calc(100% - 50px);
            }
            
            .pocket {
                width: 35px;
                height: 35px;
            }
            
            .pocket.tl { top: 10px; left: 10px; }
            .pocket.tr { top: 10px; right: 10px; }
            .pocket.bl { bottom: 10px; left: 10px; }
            .pocket.br { bottom: 10px; right: 10px; }
            
            .center-circle {
                width: 100px;
                height: 100px;
            }
            
            .controls-section {
                padding: 15px;
            }
            
            .player-card {
                padding: 10px 15px;
                min-width: 100px;
            }
        }
        
        @media (max-width: 480px) {
            .game-header {
                padding: 10px;
            }
            
            .input-group input {
                padding: 12px;
                font-size: 16px; /* Prevent zoom on iOS */
            }
            
            .btn {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1>🏆 ONLINE CARROM 🏆</h1>
        <div class="connection-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Connecting...</span>
        </div>
    </div>

    <div class="waiting-overlay" id="waitingOverlay">
        <div class="loader" id="loader"></div>
        <h2 id="waitingText">Connecting to Server...</h2>
        <p id="waitingSubtext">Please wait</p>
        <div class="error-message" id="errorMessage"></div>
        
        <!-- Room controls inside overlay -->
        <div class="room-controls" id="roomControls" style="display: none; width: 100%; max-width: 400px; margin-top: 20px;">
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" id="playerName" placeholder="Enter your name" maxlength="15" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Room ID (optional)</label>
                <input type="text" id="roomId" placeholder="Leave blank to create new room" autocomplete="off">
            </div>
            <button class="btn btn-primary" onclick="joinRoom()" id="joinBtn">Join / Create Room</button>
        </div>
    </div>

    <div class="main-container" id="gameContainer" style="display: none;">
        <div class="game-section">
            <div class="carrom-board" id="board">
                <div class="board-inner"></div>
                <div class="center-circle"></div>
                <div class="center-red-circle"></div>
                <div class="pocket tl"></div>
                <div class="pocket tr"></div>
                <div class="pocket bl"></div>
                <div class="pocket br"></div>
                <canvas id="gameCanvas" width="520" height="520"></canvas>
            </div>
            
            <div class="player-info" id="playerInfo">
                <div class="player-card" id="player1Card">
                    <div class="player-name">Player 1</div>
                    <div class="player-color" style="background: #fff; border-color: #333;"></div>
                    <div class="score" id="score1">0</div>
                </div>
                <div class="player-card" id="player2Card">
                    <div class="player-name">Waiting...</div>
                    <div class="player-color" style="background: #333;"></div>
                    <div class="score" id="score2">0</div>
                </div>
            </div>
        </div>

        <div class="controls-section">
            <div class="power-meter" id="powerMeter" style="display: none;">
                <label>Strike Power</label>
                <div class="power-bar">
                    <div class="power-fill" id="powerFill"></div>
                </div>
            </div>

            <div class="turn-indicator" id="turnIndicator" style="display: none;">
                Waiting for opponent...
            </div>

            <button class="btn btn-secondary" id="resetBtn" style="display: none;" onclick="requestReset()">
                Reset Game
            </button>

            <div class="game-log" id="gameLog">
                <h3>🎮 Game Log</h3>
                <div id="logContent"></div>
            </div>

            <div class="rules-section">
                <h4>📜 Rules</h4>
                <ul>
                    <li>White coins = Player 1</li>
                    <li>Black coins = Player 2</li>
                    <li>Queen (Red) must be covered</li>
                    <li>Drag to aim, release to strike</li>
                    <li>First to 8 points wins!</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Game Constants
        const BOARD_SIZE = 520;
        const COIN_RADIUS = 12;
        const STRIKER_RADIUS = 16;
        const POCKET_RADIUS = 25;
        const FRICTION = 0.985;
        const WALL_BOUNCE = 0.8;
        
        // Game State
        let canvas, ctx;
        let socket;
        let roomId;
        let playerId;
        let playerNumber;
        let isMyTurn = false;
        let gameState = null;
        let isDragging = false;
        let dragStart = null;
        let dragCurrent = null;
        let power = 0;
        let animationId;
        let localCoins = [];
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;
        
        // Initialize
        window.onload = function() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // Connect to server
            connectToServer();
            
            // Mouse/Touch events
            canvas.addEventListener('mousedown', handleInputStart);
            canvas.addEventListener('mousemove', handleInputMove);
            canvas.addEventListener('mouseup', handleInputEnd);
            canvas.addEventListener('touchstart', handleTouchStart, {passive: false});
            canvas.addEventListener('touchmove', handleTouchMove, {passive: false});
            canvas.addEventListener('touchend', handleInputEnd);
        };
        
        function connectToServer() {
            const serverUrl = window.location.origin;
            
            console.log('Connecting to:', serverUrl);
            
            socket = io(serverUrl, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: MAX_RECONNECT_ATTEMPTS,
                reconnectionDelay: 1000,
                timeout: 20000
            });
            
            socket.on('connect', () => {
                console.log('Connected!');
                reconnectAttempts = 0;
                updateConnectionStatus(true);
                
                // Show room controls
                document.getElementById('loader').style.display = 'none';
                document.getElementById('waitingText').textContent = 'Enter Room Details';
                document.getElementById('waitingSubtext').textContent = 'Create or join a room to start playing';
                document.getElementById('roomControls').style.display = 'block';
                document.getElementById('errorMessage').classList.remove('show');
                
                log('Connected to server');
            });
            
            socket.on('connect_error', (error) => {
                console.error('Connection error:', error);
                reconnectAttempts++;
                
                if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
                    showError('Failed to connect. Please check your internet and refresh.');
                    document.getElementById('loader').style.display = 'none';
                } else {
                    document.getElementById('waitingSubtext').textContent = `Retrying... (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`;
                }
            });
            
            socket.on('disconnect', (reason) => {
                console.log('Disconnected:', reason);
                updateConnectionStatus(false);
                log('Disconnected: ' + reason);
            });
            
            socket.on('roomJoined', (data) => {
                roomId = data.roomId;
                playerNumber = data.playerNumber;
                
                // Hide overlay and show game
                document.getElementById('waitingOverlay').classList.add('hidden');
                document.getElementById('gameContainer').style.display = 'flex';
                
                document.getElementById('powerMeter').style.display = 'block';
                document.getElementById('turnIndicator').style.display = 'block';
                document.getElementById('resetBtn').style.display = 'block';
                
                log(`Joined room ${roomId} as Player ${playerNumber}`);
                updatePlayerInfo(data.players);
            });
            
            socket.on('playerJoined', (data) => {
                log(`${data.name} joined as Player ${data.playerNumber}`);
                updatePlayerInfo(data.players);
            });
            
            socket.on('gameState', (state) => {
                gameState = state;
                localCoins = JSON.parse(JSON.stringify(state.coins));
                updateUI(state);
                if (!animationId) {
                    animate();
                }
            });
            
            socket.on('turnChange', (data) => {
                isMyTurn = data.currentPlayer === playerNumber;
                updateTurnIndicator(data);
            });
            
            socket.on('coinPocketed', (data) => {
                log(`${data.playerName} pocketed ${data.coinType}!`);
            });
            
            socket.on('gameOver', (data) => {
                const winnerCard = document.getElementById(`player${data.winner}Card`);
                winnerCard.classList.add('winner');
                log(`🎉 ${data.winnerName} WINS! 🎉`);
                setTimeout(() => alert(`🎉 ${data.winnerName} WINS! 🎉`), 100);
            });
            
            socket.on('gameReset', () => {
                document.querySelectorAll('.player-card').forEach(card => card.classList.remove('winner'));
                log('Game reset');
            });
            
            socket.on('error', (msg) => {
                showError(msg);
                document.getElementById('joinBtn').disabled = false;
            });
        }
        
        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = msg;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }
        
        function updateConnectionStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (connected) {
                dot.classList.add('connected');
                text.textContent = 'Connected';
            } else {
                dot.classList.remove('connected');
                text.textContent = 'Disconnected';
            }
        }
        
        function joinRoom() {
            const name = document.getElementById('playerName').value.trim();
            const room = document.getElementById('roomId').value.trim();
            
            if (!name) {
                showError('Please enter your name!');
                return;
            }
            
            document.getElementById('joinBtn').disabled = true;
            document.getElementById('waitingText').textContent = 'Joining...';
            document.getElementById('waitingSubtext').textContent = 'Please wait';
            document.getElementById('roomControls').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            
            socket.emit('joinRoom', { name, roomId: room });
        }
        
        function updatePlayerInfo(players) {
            if (players[0]) {
                document.querySelector('#player1Card .player-name').textContent = players[0].name;
            }
            if (players[1]) {
                document.querySelector('#player2Card .player-name').textContent = players[1].name;
            }
        }
        
        function updateUI(state) {
            document.getElementById('score1').textContent = state.scores[0];
            document.getElementById('score2').textContent = state.scores[1];
            
            document.getElementById('player1Card').classList.toggle('active', state.currentPlayer === 1);
            document.getElementById('player2Card').classList.toggle('active', state.currentPlayer === 2);
        }
        
        function updateTurnIndicator(data) {
            const indicator = document.getElementById('turnIndicator');
            if (data.currentPlayer === playerNumber) {
                indicator.textContent = '🎯 Your Turn! Drag to aim';
                indicator.style.background = 'rgba(46, 204, 113, 0.3)';
            } else {
                indicator.textContent = `⏳ ${data.playerName}'s turn...`;
                indicator.style.background = 'rgba(231, 76, 60, 0.2)';
            }
        }
        
        function handleInputStart(e) {
            if (!isMyTurn || !gameState) return;
            
            const rect = canvas.getBoundingClientRect();
            const pos = getEventPos(e, rect);
            
            const striker = localCoins.find(c => c.type === 'striker');
            if (striker) {
                const dist = Math.hypot(pos.x - striker.x, pos.y - striker.y);
                if (dist < STRIKER_RADIUS * 2) {
                    isDragging = true;
                    dragStart = pos;
                    dragCurrent = pos;
                }
            }
        }
        
        function handleInputMove(e) {
            if (!isDragging) return;
            
            const rect = canvas.getBoundingClientRect();
            dragCurrent = getEventPos(e, rect);
            
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            const distance = Math.hypot(dx, dy);
            power = Math.min(distance / 3, 100);
            
            document.getElementById('powerFill').style.width = power + '%';
        }
        
        function handleInputEnd(e) {
            if (!isDragging) return;
            
            isDragging = false;
            
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            const distance = Math.hypot(dx, dy);
            
            if (distance > 10) {
                const force = Math.min(distance * 0.15, 25);
                const angle = Math.atan2(dy, dx);
                
                socket.emit('strike', {
                    roomId,
                    force,
                    angle,
                    position: dragStart
                });
                
                log('Striker hit!');
            }
            
            power = 0;
            document.getElementById('powerFill').style.width = '0%';
        }
        
        function handleTouchStart(e) {
            e.preventDefault();
            handleInputStart(e.touches[0]);
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            handleInputMove(e.touches[0]);
        }
        
        function getEventPos(e, rect) {
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isDragging && dragStart && dragCurrent) {
                ctx.beginPath();
                ctx.moveTo(dragStart.x, dragStart.y);
                ctx.lineTo(dragCurrent.x, dragCurrent.y);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
                
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                const distance = Math.hypot(dx, dy);
                const force = Math.min(distance * 0.15, 25);
                const angle = Math.atan2(dy, dx);
                
                ctx.beginPath();
                ctx.moveTo(dragStart.x, dragStart.y);
                ctx.lineTo(
                    dragStart.x + Math.cos(angle) * force * 10,
                    dragStart.y + Math.sin(angle) * force * 10
                );
                ctx.strokeStyle = 'rgba(255, 255, 0, 0.3)';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            
            if (localCoins) {
                localCoins.forEach(coin => {
                    if (!coin.pocketed) {
                        drawCoin(coin);
                    }
                });
            }
            
            requestAnimationFrame(animate);
        }
        
        function drawCoin(coin) {
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, coin.radius || COIN_RADIUS, 0, Math.PI * 2);
            
            if (coin.type === 'striker') {
                ctx.fillStyle = '#e74c3c';
                ctx.strokeStyle = '#c0392b';
            } else if (coin.type === 'white') {
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#ddd';
            } else if (coin.type === 'black') {
                ctx.fillStyle = '#2c3e50';
                ctx.strokeStyle = '#1a252f';
            } else if (coin.type === 'queen') {
                ctx.fillStyle = '#e74c3c';
                ctx.strokeStyle = '#c0392b';
            }
            
            ctx.lineWidth = 2;
            ctx.fill();
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(coin.x - 3, coin.y - 3, (coin.radius || COIN_RADIUS) / 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fill();
            
            if (coin.type === 'queen') {
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#gold';
                ctx.fill();
            }
        }
        
        function requestReset() {
            if (confirm('Reset the game?')) {
                socket.emit('resetGame', roomId);
            }
        }
        
        function log(message) {
            const logContent = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContent.insertBefore(entry, logContent.firstChild);
            
            while (logContent.children.length > 20) {
                logContent.removeChild(logContent.lastChild);
            }
        }
    </script>
</body>
</html>
